services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: meetpoint
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d meetpoint"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/meetpoint
      CLIENT_URL: http://localhost:3000
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
